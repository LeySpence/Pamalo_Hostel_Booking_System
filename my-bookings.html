<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="assets/style/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <script src="assets/js/data.js" defer></script>
    <script src="assets/js/dashboard.js" defer></script>
    <title>My Bookings - Pamalo Hostel Booking System</title>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2><span>Pamalo</span> Hostels</h2>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="my-bookings.html" class="active"><i class="fas fa-calendar-check"></i> My Bookings</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <div class="nav-label">Account</div>
            <a href="edit-profile.html"><i class="fas fa-user-cog"></i> Edit Profile</a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html"><i class="fas fa-sign-out-alt"></i> Back to Site</a>
        </div>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger-dash"><i class="fas fa-bars"></i></button>
                <h3 style="font-size:18px;color:#333;font-weight:normal;">My Bookings</h3>
            </div>
            <div class="topbar-right">
                <a href="notifications.html" class="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </a>
                <div class="user-info">
                    <i class="fas fa-user-circle" style="font-size:24px;color:#009272;"></i>
                    <span>John Doe</span>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h2>My Bookings</h2>
                <p>Manage all your hostel reservations in one place.</p>
            </div>

            <div class="filters-bar">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Active</button>
                <button class="filter-btn">Upcoming</button>
                <button class="filter-btn">Completed</button>
                <button class="filter-btn">Cancelled</button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Booking ID</th>
                                    <th>Hostel</th>
                                    <th>Room</th>
                                    <th>Check-in</th>
                                    <th>Check-out</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

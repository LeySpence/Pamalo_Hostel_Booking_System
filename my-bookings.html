<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <script src="assets/js/data.js" defer></script>
    <title>My Bookings - Pamalo Hostel Booking System</title>
</head>
<body class="dash-body">
    <div class="sidebar">
        <h2>Pamalo Hostel</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="my-bookings.html" class="active">My Bookings</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="edit-profile.html">Profile</a></li>
            <li style="margin-top:40px;"><a href="index.html">Back to Site</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div style="margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Active</button>
            <button class="filter-btn">Upcoming</button>
            <button class="filter-btn">Completed</button>
            <button class="filter-btn">Cancelled</button>
        </div>

        <section class="table-section">
            <h2>Bookings</h2>
            <table>
                <thead>
                    <tr><th>Booking ID</th><th>Hostel</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="bookings-table-body"></tbody>
            </table>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- Added defer to ensure DOM is loaded before script runs -->
    <script src="assets/js/script.js" defer></script> 
    <title>Pamalo Hostel Booking System</title>
</head>

<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger">
                <span>&#9776;</span>
            </div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <h2>Login to Your Account</h2>
            <form action="instance.com/login" method="post">
                <p>Username:
                    <input type="text" name="username" maxlength="30" size="20" required>
                </p>
                <p>Password:
                    <input type="password" name="password" minlength="10" maxlength="12" size="20" required>
                </p>
                <input type="submit" value="Login">
            </form>
            <p>Don't have an account? <a href="signup.html">Sign up here</a>.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>

</html>

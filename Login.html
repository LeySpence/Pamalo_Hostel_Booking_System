<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/data.js" defer></script>
    <script src="assets/js/dashboard.js" defer></script>
    <title>Login - Pamalo Hostel Booking System</title>
</head>
<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger"><span>&#9776;</span></div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="hostels.html">Hostels</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html" class="active">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <h2>Login to Your Account</h2>
            <div id="login-error" class="alert" style="display:none;"></div>
            <form id="login-form" action="#" method="post">
                <p>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </p>
                <p>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" minlength="6" required>
                </p>
                <p style="text-align:right;">
                    <a href="reset-password.html" style="color:#009272;font-size:14px;">Forgot password?</a>
                </p>
                <input type="submit" value="Login">
            </form>
            <p>Don't have an account? <a href="Signup.html">Sign up here</a>.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <title>Hostels - Pamalo Hostel Booking System</title>
</head>
<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger"><span>&#9776;</span></div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="hostels.html">Hostels</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="hostels">
            <h2>Browse Hostels</h2>
            <p style="text-align:center;color:#777;margin-bottom:30px;">Search available rooms by date, price, type, and more.</p>

            <div class="search-filters" style="background:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:30px;">
                <div class="form-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;">
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px;font-weight:600;color:#555;">Check-in</label>
                        <input type="date" id="filter-checkin" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:5px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px;font-weight:600;color:#555;">Check-out</label>
                        <input type="date" id="filter-checkout" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:5px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px;font-weight:600;color:#555;">Max Price (MK)</label>
                        <input type="number" id="filter-price" placeholder="e.g. 50000" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:5px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px;font-weight:600;color:#555;">Capacity</label>
                        <select id="filter-capacity" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:5px;">
                            <option value="">Any</option>
                            <option value="1">1 person</option>
                            <option value="2">2 people</option>
                            <option value="4">4 people</option>
                            <option value="6">6 people</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px;font-weight:600;color:#555;">Room Type</label>
                        <select id="filter-type" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:5px;">
                            <option value="">All Types</option>
                            <option value="Single Room">Single Room</option>
                            <option value="Double Room">Double Room</option>
                            <option value="Shared Dorm">Shared Dorm</option>
                            <option value="Suite">Suite</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;display:flex;align-items:flex-end;">
                        <button id="search-btn" class="btn btn-primary" style="width:100%;">Search</button>
                    </div>
                </div>
            </div>

            <div id="search-results-info" style="margin-bottom:20px;color:#777;font-size:14px;"></div>
            <div id="room-results" class="hostel-cards"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <title>Reset Password - Pamalo Hostel Booking System</title>
</head>
<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger"><span>&#9776;</span></div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <h2>Reset Password</h2>
            <div id="reset-error" class="alert" style="display:none;"></div>
            <div id="reset-success" class="alert alert-success" style="display:none;"></div>

            <form id="reset-request-form" action="#" method="post">
                <p><label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required></p>
                <input type="submit" value="Send Reset Code">
            </form>

            <form id="reset-complete-form" action="#" method="post" style="display:none;margin-top:20px;">
                <p><label>Reset Code</label>
                <input type="text" name="code" placeholder="Enter code from email" required></p>
                <p><label>New Password</label>
                <input type="password" name="newPassword" placeholder="At least 6 characters" minlength="6" required></p>
                <p><label>Confirm New Password</label>
                <input type="password" name="confirmPassword" placeholder="Repeat password" minlength="6" required></p>
                <input type="submit" value="Reset Password">
            </form>

            <p><a href="Login.html" style="color:#009272;">Back to Login</a></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>
</html>

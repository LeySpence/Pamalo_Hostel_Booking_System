<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="assets/style/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <script src="assets/js/data.js" defer></script>
    <script src="assets/js/dashboard.js" defer></script>
    <title>Booking Details - Pamalo Hostel Booking System</title>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2><span>Pamalo</span> Hostels</h2>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="my-bookings.html" class="active"><i class="fas fa-calendar-check"></i> My Bookings</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            <div class="nav-label">Account</div>
            <a href="edit-profile.html"><i class="fas fa-user-cog"></i> Edit Profile</a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html"><i class="fas fa-sign-out-alt"></i> Back to Site</a>
        </div>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger-dash"><i class="fas fa-bars"></i></button>
                <h3 style="font-size:18px;color:#333;font-weight:normal;">Booking Details</h3>
            </div>
            <div class="topbar-right">
                <a href="notifications.html" class="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </a>
                <div class="user-info">
                    <i class="fas fa-user-circle" style="font-size:24px;color:#009272;"></i>
                    <span>John Doe</span>
                </div>
            </div>
        </header>

        <div class="page-content" id="booking-details-container">
            <div class="page-header">
                <h2 id="booking-title">Booking</h2>
                <p><a href="my-bookings.html" style="color:#009272;text-decoration:none;">&larr; Back to My Bookings</a></p>
            </div>

            <div class="alert alert-success">
                <i class="fas fa-check-circle"></i> Loading booking details...
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>Stay Details</h3>
                    </div>
                    <div class="card-body">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>Hostel</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Room Type</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Check-in</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Check-out</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Duration</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Guests</label>
                                <p></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Payment Status</h3>
                    </div>
                    <div class="card-body">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>Amount</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Status</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Payment Method</label>
                                <p></p>
                            </div>
                            <div class="detail-item">
                                <label>Paid On</label>
                                <p></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Booking Summary</h3>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="receipt-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Actions</h3>
                </div>
                <div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-secondary"><i class="fas fa-download"></i> Download Receipt</button>
                    <button class="btn btn-warning"><i class="fas fa-headset"></i> Get Support</button>
                    <button class="btn btn-danger"><i class="fas fa-ban"></i> Cancel Booking</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Reviews</h3>
                </div>
                <div class="card-body">
                    <div id="reviews-container"></div>
                    <hr style="margin:20px 0;">
                    <h4 style="margin-bottom:15px;">Leave a Review</h4>
                    <form id="review-form">
                        <div class="form-group">
                            <label>Rating</label>
                            <select name="rating" required>
                                <option value="5">5 - Excellent</option>
                                <option value="4">4 - Good</option>
                                <option value="3">3 - Average</option>
                                <option value="2">2 - Poor</option>
                                <option value="1">1 - Terrible</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Comment</label>
                            <textarea name="comment" placeholder="Share your experience..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

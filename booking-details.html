<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/script.js" defer></script>
    <title>Booking Details - Pamalo Hostel Booking System</title>
</head>
<body class="dash-body">
    <div class="sidebar">
        <h2>Pamalo Hostel</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="my-bookings.html" class="active">My Bookings</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="edit-profile.html">Profile</a></li>
            <li style="margin-top:40px;"><a href="index.html">Back to Site</a></li>
        </ul>
    </div>
    <div class="main-content" id="booking-details-container">
        <span id="booking-title" style="display:none;"></span>

        <div class="alert alert-success">
            <i class="fas fa-check-circle"></i> Loading booking details...
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
            <section class="table-section">
                <h2 style="margin-bottom:20px;">Stay Details</h2>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Hostel</label><p id="detail-hostel" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Room Type</label><p id="detail-room" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Check-in</label><p id="detail-checkin" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Check-out</label><p id="detail-checkout" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Duration</label><p id="detail-duration" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Guests</label><p id="detail-guests" style="font-size:15px;color:#333;margin:0;"></p></div>
                </div>
            </section>

            <section class="table-section">
                <h2 style="margin-bottom:20px;">Payment Status</h2>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Amount</label><p id="detail-amount" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Status</label><p id="detail-paystatus" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Payment Method</label><p id="detail-method" style="font-size:15px;color:#333;margin:0;"></p></div>
                    <div><label style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;">Paid On</label><p id="detail-paidon" style="font-size:15px;color:#333;margin:0;"></p></div>
                </div>
            </section>
        </div>

        <section class="table-section" style="margin-bottom:20px;">
            <h2 style="margin-bottom:20px;">Booking Summary</h2>
            <table>
                <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
                <tbody id="receipt-body"></tbody>
            </table>
        </section>

        <section class="table-section" style="margin-bottom:20px;">
            <h2 style="margin-bottom:20px;">Actions</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-secondary"><i class="fas fa-download"></i> Download Receipt</button>
                <button class="btn btn-warning"><i class="fas fa-headset"></i> Get Support</button>
                <button class="btn btn-danger"><i class="fas fa-ban"></i> Cancel Booking</button>
            </div>
        </section>

        <section class="table-section">
            <h2 style="margin-bottom:20px;">Reviews</h2>
            <div id="reviews-container" style="margin-bottom:20px;"></div>
            <hr style="margin:20px 0;">
            <h3 style="margin-bottom:15px;">Leave a Review</h3>
            <form id="review-form">
                <div class="form-group">
                    <label>Rating</label>
                    <select name="rating" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Terrible</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Comment</label>
                    <textarea name="comment" placeholder="Share your experience..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </form>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/data.js" defer></script>
    <title>Sign Up - Pamalo Hostel Booking System</title>
</head>
<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger"><span>&#9776;</span></div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="hostels.html">Hostels</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <h2>Create Your Account</h2>
            <div id="signup-error" class="alert" style="display:none;"></div>
            <div id="signup-success" class="alert alert-success" style="display:none;"></div>
            <form id="signup-form" action="#" method="post">
                <p>
                    <label>First Name</label>
                    <input type="text" name="firstName" placeholder="John" maxlength="50" required>
                </p>
                <p>
                    <label>Last Name</label>
                    <input type="text" name="lastName" placeholder="Doe" maxlength="50" required>
                </p>
                <p>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </p>
                <p>
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="+265 999 000 000">
                </p>
                <p>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="At least 6 characters" minlength="6" required>
                </p>
                <p>
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword" placeholder="Repeat password" minlength="6" required>
                </p>
                <input type="submit" value="Create Account">
            </form>
            <p>Already have an account? <a href="Login.html">Log in here</a>.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>
</html>

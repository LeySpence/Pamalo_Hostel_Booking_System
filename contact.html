<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="assets/js/data.js" defer></script>
    <title>Contact - Pamalo Hostel Booking System</title>
</head>
<body>
    <header>
        <div class="topnav">
            <div class="logo">
                <h1>Pamalo Hostel Booking System</h1>
            </div>
            <div class="hamburger"><span>&#9776;</span></div>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="hostels.html">Hostels</a>
            <a href="contact.html">Contact</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>
    <main>
        <section class="contact">
            <h2>Contact Us</h2>
            <p>We'd love to hear from you! Get in touch with our support team.</p>
            <div id="contact-alert" class="alert" style="display:none;"></div>

            <div class="contact-container">
                <div class="contact-info">
                    <p><i class="fas fa-map-marker-alt"></i> Area 47, Lilongwe, Malawi</p>
                    <p><i class="fas fa-envelope"></i> info@pamalo.com</p>
                    <p><i class="fas fa-phone"></i> +265 123 456 789</p>
                    <p><i class="fas fa-clock"></i> Mon-Sun: 8 AM - 8 PM</p>
                </div>
                <div class="contact-form">
                    <form id="contact-form" action="#" method="post">
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="email" name="email" placeholder="Your Email" required>
                        <input type="text" name="subject" placeholder="Subject" required>
                        <textarea name="message" placeholder="Your Message" required></textarea>
                        <button type="submit">Send Message</button>
                    </form>
                </div>
            </div>

            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.1234567890123!2d-122.1234567890123!3d37.1234567890123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808f123456789012%3A0x1234567890123456!2sPamalo%20Hostel%20Booking%20System!5e0!3m2!1sen!2sus!4v1612345678901" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pamalo Hostel Booking System. All rights reserved.</p>
    </footer>
</body>
</html>
